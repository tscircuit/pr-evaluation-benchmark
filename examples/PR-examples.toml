+  constructor(workerCount = 4) {
+    this.workers = Array(workerCount)
+      .fill(0)
+      .map(() => new Worker('./imageWorker.js'));
+      
+    this.cache = new LRUCache({
+      max: 500,
+      maxSize: 100 * 1024 * 1024 // 100MB
