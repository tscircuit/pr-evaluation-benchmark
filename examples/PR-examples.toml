[[test_cases]]
title = "Implement rate limiting middleware"
body = "Added a new rate limiting middleware to protect API endpoints from abuse. Configurable limits per endpoint and user, with Redis-based storage for distributed environments."
expected_impact = "Minor"
diff = '''diff --git a/src/middleware/rateLimiter.ts b/src/middleware/rateLimiter.ts
new file mode 100644
index 0000000..e2d16c8
--- /dev/null
+++ b/src/middleware/rateLimiter.ts
@@ -0,0 +1,35 @@
+import Redis from 'ioredis';
+import { Request, Response, NextFunction } from 'express';
+
+export class RateLimiter {
+  private redis: Redis;
+  
+  constructor(redisUrl: string) {
+    this.redis = new Redis(redisUrl);
+  }
+
+  middleware(limit: number, window: number) {
+    return async (req: Request, res: Response, next: NextFunction) => {
+      const key = `ratelimit:${req.ip}:${req.path}`;
+      const current = await this.redis.incr(key);
+      
+      if (current === 1) {
+        await this.redis.expire(key, window);
+      }
+      
+      if (current > limit) {
+        res.status(429).json({
+          error: 'Too Many Requests',
+          retryAfter: await this.redis.ttl(key)
+        });
+        return;
+      }
+      
+      next();
+    };
+  }
+}'''

[[test_cases]]
title = "Fix memory leak in WebSocket connections"
body = "Fixed a critical memory leak where WebSocket connections weren't being properly cleaned up after client disconnection. Added connection tracking and automatic cleanup after timeout."
expected_impact = "Minor"
diff = '''diff --git a/src/websocket/connection.ts b/src/websocket/connection.ts
index 8b13789..e2d16c8 100644
--- a/src/websocket/connection.ts
+++ b/src/websocket/connection.ts
@@ -1,12 +1,32 @@
 export class WebSocketManager {
+  private connections: Map<string, WebSocket>;
+  private timeouts: Map<string, NodeJS.Timeout>;
+
   constructor() {
+    this.connections = new Map();
+    this.timeouts = new Map();
   }
 
   handleConnection(ws: WebSocket, id: string) {
+    this.connections.set(id, ws);
+    
+    const timeout = setTimeout(() => {
+      this.cleanup(id);
+    }, 30000);
+    
+    this.timeouts.set(id, timeout);
+
     ws.on('close', () => {
-      // Before: No cleanup
+      this.cleanup(id);
     });
   }
+  
+  private cleanup(id: string) {
+    const ws = this.connections.get(id);
+    ws?.close();
+    this.connections.delete(id);
+    clearTimeout(this.timeouts.get(id));
+    this.timeouts.delete(id);
+  }
 }'''

