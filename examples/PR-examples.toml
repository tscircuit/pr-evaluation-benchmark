[[test_cases]]
title = "Refactor logging module for better performance"
body = "Reorganized the logging module to improve performance by optimizing file writes and reducing redundant operations. No changes to public APIs or functionality."
expected_impact = "Tiny"
diff = '''diff --git a/src/logging/Logger.ts b/src/logging/Logger.ts
index 8b13789..e2d16c8 100644
--- a/src/logging/Logger.ts
+++ b/src/logging/Logger.ts
@@ -1,15 +1,29 @@
-export class Logger {
-  async log(message: string): Promise<void> {
-    await fs.promises.appendFile(
-      this.logFile,
-      message + '\n'
-    );
+import { Queue } from './queue';
+
+export class Logger { 
+  private writeQueue: Queue<string>;
+  
+  constructor() {
+    this.writeQueue = new Queue();
   }
+  
+  async log(message: string): Promise<void> {
+    this.writeQueue.enqueue(message);
+    await this.processQueue();
+  }
+
+  private async processQueue(): Promise<void> {
+    const batchSize = 100;
+    const messages = [];
+    
+    while (!this.writeQueue.isEmpty() && messages.length < batchSize) {
+      messages.push(this.writeQueue.dequeue());
+    }
+
+    if (messages.length > 0) {
+      await fs.promises.appendFile(this.logFile, messages.join('\n') + '\n');
+    }
+  }
 }'''

